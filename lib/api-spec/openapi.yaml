openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contacts
    description: Contact form operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contacts:
    post:
      operationId: submitContact
      tags: [contacts]
      summary: Submit contact form
      description: Submit a contact form message and send email notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactSubmission"
      responses:
        "201":
          description: Contact submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactSubmission:
      type: object
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 255
          description: Contact full name
        email:
          type: string
          format: email
          maxLength: 320
          description: Email address
        company:
          type: string
          maxLength: 255
          description: Company name (optional)
        message:
          type: string
          minLength: 10
          maxLength: 5000
          description: Contact message
        phone:
          type: string
          maxLength: 50
          description: Phone number (optional)
      required:
        - fullName
        - email
        - message
    ContactResponse:
      type: object
      properties:
        id:
          type: integer
          description: Contact ID
        publicId:
          type: string
          description: Public-facing contact ID
        fullName:
          type: string
          description: Contact full name
        email:
          type: string
          description: Email address
        company:
          type: string
          description: Company name
        message:
          type: string
          description: Contact message
        phone:
          type: string
          description: Phone number
        source:
          type: string
          description: Contact source
        status:
          type: string
          description: Contact status
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
      required:
        - id
        - publicId
        - fullName
        - email
        - message
        - source
        - status
        - createdAt
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                description: Field with error
              message:
                type: string
                description: Error message for field
          description: Detailed validation errors
      required:
        - error

