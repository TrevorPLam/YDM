kind = "web"
previewPath = "/"
title = "Nexus Digital"
version = "1.0.0"
id = "artifacts/nexus-digital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23379

[services.development]
run = "pnpm --filter @workspace/nexus-digital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexus-digital", "run", "build" ]
publicDir = "artifacts/nexus-digital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23379"
BASE_PATH = "/"
